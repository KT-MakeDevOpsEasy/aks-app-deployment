# Prod environment overrides

frontend:
  replicaCount: 3
  gateway:
    enabled: true
    className: cilium
    hostname: app.example.com
    tls:
      enabled: true
      secretName: app-tls
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

backend:
  replicaCount: 3
  config:
    logLevel: "warn"
  externalSecrets:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 20
    targetCPUUtilizationPercentage: 60

database:
  storage:
    size: 50Gi
    storageClassName: managed-premium
  externalSecrets:
    enabled: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
