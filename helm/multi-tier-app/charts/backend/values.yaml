replicaCount: 2

image:
  repository: python
  tag: "3.12-slim"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

config:
  databaseHost: ""
  databasePort: "5432"
  databaseName: "appdb"
  logLevel: "info"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

externalSecrets:
  enabled: false
  storeName: azure-keyvault
  refreshInterval: 1h
  keys:
    databaseUser: db-user
    databasePassword: db-password

nodeSelector: {}
tolerations: []
