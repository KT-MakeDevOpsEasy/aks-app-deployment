replicaCount: 1

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

service:
  port: 5432

storage:
  size: 10Gi
  storageClassName: managed-premium

credentials:
  postgresUser: appuser
  postgresPassword: changeme-use-external-secrets
  postgresDb: appdb

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []

backup:
  enabled: false
  schedule: "0 2 * * *"
