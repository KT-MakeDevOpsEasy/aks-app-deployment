# Dev environment overrides

frontend:
  replicaCount: 1
  ingress:
    hosts:
      - host: app.dev.example.com
        paths:
          - path: /
            pathType: Prefix
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 128Mi
  autoscaling:
    enabled: false

backend:
  replicaCount: 1
  config:
    logLevel: "debug"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  autoscaling:
    enabled: false

database:
  storage:
    size: 5Gi
    storageClassName: managed
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
